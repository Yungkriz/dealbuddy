<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DealBuddy — Find the Best Deals</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;color:#333;background:#f8f9fa}
    img{max-width:100%;height:auto;border-radius:8px}
    a{text-decoration:none;color:inherit}

    /* Header */
    .header{background:linear-gradient(135deg,#1e293b,#334155);padding:1rem 2rem;position:sticky;top:0;z-index:100}
    .header nav{display:flex;align-items:center;gap:1.5rem;max-width:1200px;margin:0 auto;flex-wrap:wrap}
    .logo{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-links{display:flex;gap:1.5rem;align-items:center}
    .nav-links a{color:#e2e8f0;font-weight:500;transition:color .2s}
    .nav-links a:hover,.nav-links a.active{color:#fff}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:1rem}
    .badge{background:#ef4444;color:#fff;padding:0.25rem 0.625rem;border-radius:50px;font-size:0.8rem;font-weight:700;cursor:pointer}
    .cart-badge{background:#16a34a}

    /* Hero */
    .hero{text-align:center;padding:5rem 2rem;background:linear-gradient(135deg,#667eea,#764ba2 50%,#f093fb);color:#fff}
    .hero h1{font-size:2.5rem;margin-bottom:1rem}
    .hero p{font-size:1.1rem;margin-bottom:2rem;opacity:0.9;max-width:500px;margin-left:auto;margin-right:auto}
    .search-box{max-width:500px;margin:0 auto;display:flex;gap:0.5rem}
    .search-box input{flex:1;padding:1rem 1.5rem;border:none;border-radius:12px;font-size:1rem;background:rgba(255,255,255,0.15);color:#fff}
    .search-box input::placeholder{color:rgba(255,255,255,0.6)}
    .search-box input:focus{outline:2px solid #f59e0b}
    .search-box button{padding:1rem 2rem;background:linear-gradient(135deg,#f59e0b,#f97316);color:#1e293b;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}

    /* Stats */
    .stats-bar{background:#fff;padding:1.5rem 2rem;border-bottom:1px solid #e2e8f0}
    .stats-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:center;gap:3rem;flex-wrap:wrap}
    .stat-item{text-align:center}
    .stat-number{font-size:1.75rem;font-weight:800;color:#667eea}
    .stat-label{font-size:0.8rem;color:#64748b;text-transform:uppercase}

    /* Products */
    .deals{padding:4rem 2rem;max-width:1200px;margin:0 auto}
    .section-title{font-size:1.75rem;margin-bottom:2rem;text-align:center}
    .deals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
    .deal-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.06);transition:transform .3s,box-shadow .3s}
    .deal-card:hover{transform:translateY(-8px);box-shadow:0 12px 40px rgba(0,0,0,0.15)}
    .deal-card:hover img{transform:scale(1.05)}
    .deal-card img{width:100%;height:200px;object-fit:cover;transition:transform .3s}
    .card-body{padding:1.25rem}
    .card-title{font-size:1rem;font-weight:700;margin-bottom:0.5rem}
    .card-price{font-size:1.1rem}
    .card-price strong{color:#1e293b}
    .card-price s{color:#999;margin-left:0.5rem}
    .card-savings{color:#16a34a;font-weight:600;margin-top:0.25rem;font-size:0.9rem}
    .card-retailer{color:#64748b;font-size:0.85rem;margin-top:0.25rem}
    .card-actions{display:flex;gap:0.75rem;margin-top:1rem;align-items:center}
    .btn-cart{padding:0.5rem 1rem;background:#f1f5f9;border:2px solid #e2e8f0;border-radius:8px;font-weight:600;font-size:0.85rem;cursor:pointer;transition:all .2s;color:#475569}
    .btn-cart.added{background:#dcfce7;border-color:#16a34a;color:#16a34a}
    .btn-fav{position:absolute;top:0.5rem;right:0.5rem;background:#fff;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.15);z-index:2}
    .card-badge{position:absolute;top:0.5rem;left:0.5rem;background:#fff;padding:0.25rem 0.5rem;border-radius:6px;font-size:0.75rem;font-weight:700;color:#667eea}

    /* Categories */
    .categories{padding:4rem 2rem;max-width:1200px;margin:0 auto;text-align:center}
    .categories ul{list-style:none;display:flex;flex-wrap:wrap;justify-content:center;gap:0.75rem;margin-top:1rem}
    .categories li a{display:inline-block;padding:0.75rem 1.5rem;background:#fff;border:2px solid #e2e8f0;border-radius:50px;font-weight:600;color:#475569;transition:all .3s}
    .categories li a:hover,.categories li a.active{border-color:#667eea;color:#667eea;transform:translateY(-2px)}

    /* Cart Drawer */
    .cart-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:199;display:none}
    .cart-drawer{position:fixed;top:0;right:0;width:350px;max-width:90vw;height:100vh;background:#fff;box-shadow:-4px 0 30px rgba(0,0,0,0.15);z-index:200;padding:2rem;overflow-y:auto;transform:translateX(100%);transition:transform .3s}
    .cart-drawer.open{transform:translateX(0)}
    .cart-overlay.open{display:block}
    .cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
    .cart-close{background:none;border:none;font-size:1.5rem;cursor:pointer}
    .cart-item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid #e2e8f0;align-items:center}
    .cart-item img{width:60px;height:60px;object-fit:cover;border-radius:8px}
    .cart-item-info{flex:1}
    .cart-item-title{font-weight:600;font-size:0.9rem}
    .cart-item-price{color:#16a34a;font-weight:700}
    .cart-empty{text-align:center;padding:3rem 1rem;color:#64748b}
    .cart-total{font-size:1.25rem;font-weight:700;margin-top:1.5rem;padding-top:1rem;border-top:2px solid #e2e8f0}
    .btn-clear{padding:0.25rem 0.75rem;background:#ef4444;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.8rem;float:right}

    /* Footer */
    .footer{background:linear-gradient(135deg,#1e293b,#0f172a);color:#fff;padding:3rem 2rem;text-align:center;margin-top:4rem}
    .footer p{opacity:0.6;font-size:0.875rem}

    /* Loading & Error */
    .loading{text-align:center;padding:3rem;color:#666}
    .error-msg{text-align:center;padding:3rem;color:#dc2626}

    /* Responsive */
    @media(max-width:768px){
      .hero h1{font-size:1.75rem}
      .hero p{font-size:1rem}
      .deals-grid{grid-template-columns:1fr}
      .header nav{gap:1rem}
      .nav-links{gap:1rem}
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <nav>
      <div class="logo">DealBuddy</div>
      <div class="nav-links">
        <a href="#" class="active" data-page="home">Deals</a>
        <a href="#" data-page="categories">Categories</a>
      </div>
      <div class="header-right">
        <span class="badge" id="favBadge">❤️ 0</span>
        <span class="badge cart-badge" id="cartBadge">🛒 0</span>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main id="mainContent"></main>

  <!-- Cart Drawer -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3>🛒 Your Cart</h3>
<button class="cart-close" id="cartClose">✕</button>
    </div>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal"></div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2026 Owolabi Onaope Christopher. All rights reserved.</p>
  </footer>

  <script>
    // ===== APP STATE =====
    const API = 'https://dealbuddy-api.onrender.com/api';
    let allProducts = [];
    let favorites = JSON.parse(localStorage.getItem('db_favs')) || [];
    let cart = JSON.parse(localStorage.getItem('db_cart')) || [];
    let currentCategory = '';
    let searchTerm = '';

    // ===== FETCH PRODUCTS =====
    async function loadProducts() {
      const main = document.getElementById('mainContent');
      main.innerHTML = '<div class="loading">🔄 Loading deals...</div>';
      try {
        const res = await fetch(API + '/api/products');
        allProducts = await res.json();
        renderHome();
      } catch (e) {
        main.innerHTML = '<div class="error-msg"><h2>❌ Error loading products</h2><p>' + e.message + '</p></div>';
      }
    }

    // ===== RENDER HOME =====
    function renderHome() {
      const main = document.getElementById('mainContent');
      const filtered = getFiltered();
      const categories = [...new Set(allProducts.map(p => p.category))];
      const avgPrice = allProducts.length ? Math.round(allProducts.reduce((s, p) => s + p.price, 0) / allProducts.length) : 0;
      const under50 = allProducts.filter(p => p.price < 50).length;

      let html = `
        <section class="hero">
          <h1>Find the Best Deals Near You</h1>
          <p>Save money on electronics, fashion, home essentials, AI tools, groceries and more.</p>
          <div class="search-box">
            <input type="search" id="searchInput" placeholder="Search products..." value="${searchTerm}">
            <button id="searchBtn">Search</button>
          </div>
        </section>
        <section class="stats-bar">
          <div class="stats-inner">
            <div class="stat-item"><div class="stat-number">${allProducts.length}</div><div class="stat-label">Products</div></div>
            <div class="stat-item"><div class="stat-number">${under50}</div><div class="stat-label">Under $50</div></div>
            <div class="stat-item"><div class="stat-number">${categories.length}</div><div class="stat-label">Categories</div></div>
            <div class="stat-item"><div class="stat-number">$${avgPrice}</div><div class="stat-label">Avg Price</div></div>
          </div>
        </section>
        <section class="deals">
          <h2 class="section-title">Featured Deals (${filtered.length})</h2>
          <div class="deals-grid">
            ${filtered.map(p => createDealCard(p)).join('')}
          </div>
        </section>
        <section class="categories">
          <h2 class="section-title">Browse by Category</h2>
          <ul>
            <li><a href="#" class="${!currentCategory ? 'active' : ''}" data-category="">All</a></li>
            ${categories.map(c => `<li><a href="#" class="${currentCategory === c ? 'active' : ''}" data-category="${c}">${c}</a></li>`).join('')}
          </ul>
        </section>
      `;
      main.innerHTML = html;
      bindEvents();
    }

    // ===== CREATE DEAL CARD =====
    function createDealCard(p) {
      const isFav = favorites.includes(p.id);
      const inCart = cart.find(i => i.id === p.id);
      const originalPrice = (p.price * 1.3).toFixed(2);
      const savings = (p.price * 0.3).toFixed(2);
      return `
        <article class="deal-card">
          <div style="position:relative">
            <img src="${p.image}" alt="${p.title}" loading="lazy">
            <span class="card-badge">${p.category}</span>
            <button class="btn-fav" data-id="${p.id}">${isFav ? '❤️' : '🤍'}</button>
          </div>
          <div class="card-body">
            <h3 class="card-title">${p.title}</h3>
            <p class="card-price"><strong>$${p.price.toFixed(2)}</strong> <s>$${originalPrice}</s></p>
<p class="card-savings">Save $${savings} at ${p.rating.rate} ⭐️</p>
            <div class="card-actions">
              <button class="btn-cart ${inCart ? 'added' : ''}" data-id="${p.id}">${inCart ? '✓ In Cart' : '+ Add to Cart'}</button>
            </div>
          </div>
        </article>
      `;
    }

    // ===== FILTER PRODUCTS =====
    function getFiltered() {
      let result = allProducts;
      if (currentCategory) result = result.filter(p => p.category === currentCategory);
      if (searchTerm) {
        const t = searchTerm.toLowerCase();
        result = result.filter(p => p.title.toLowerCase().includes(t) || p.category.toLowerCase().includes(t));
      }
      return result;
    }

    // ===== EVENT BINDING =====
    function bindEvents() {
      // Search
      document.getElementById('searchBtn').onclick = function() {
        searchTerm = document.getElementById('searchInput').value;
        renderHome();
      };
      document.getElementById('searchInput').onkeypress = function(e) {
        if (e.key === 'Enter') {
          searchTerm = this.value;
          renderHome();
        }
      };

      // Category filters
      document.querySelectorAll('[data-category]').forEach(function(a) {
        a.onclick = function(e) {
          e.preventDefault();
          currentCategory = this.dataset.category;
          renderHome();
        };
      });

      // Favorite buttons
      document.querySelectorAll('.btn-fav').forEach(function(btn) {
        btn.onclick = function() {
          const id = parseInt(this.dataset.id);
          if (favorites.includes(id)) {
            favorites = favorites.filter(x => x !== id);
          } else {
            favorites.push(id);
          }
          localStorage.setItem('db_favs', JSON.stringify(favorites));
          updateBadges();
          renderHome();
        };
      });

      // Cart buttons
      document.querySelectorAll('.btn-cart').forEach(function(btn) {
        btn.onclick = function() {
          const id = parseInt(this.dataset.id);
          const product = allProducts.find(p => p.id === id);
          if (cart.find(i => i.id === id)) {
            cart = cart.filter(i => i.id !== id);
          } else {
            cart.push(product);
          }
          localStorage.setItem('db_cart', JSON.stringify(cart));
          updateBadges();
          renderHome();
        };
      });

      // Cart toggle
      document.getElementById('cartBadge').onclick = function() {
        document.getElementById('cartDrawer').classList.add('open');
        document.getElementById('cartOverlay').classList.add('open');
        renderCart();
      };
      document.getElementById('cartClose').onclick = closeCart;
      document.getElementById('cartOverlay').onclick = closeCart;
    }

    // ===== CART =====
    function closeCart() {
      document.getElementById('cartDrawer').classList.remove('open');
      document.getElementById('cartOverlay').classList.remove('open');
    }

    function renderCart() {
      const container = document.getElementById('cartItems');
      const totalEl = document.getElementById('cartTotal');
      if (cart.length === 0) {
        container.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
        totalEl.innerHTML = '';
        return;
      }
      container.innerHTML = cart.map(i => `
        <div class="cart-item">
          <img src="${i.image}" alt="${i.title}">
          <div class="cart-item-info">
            <div class="cart-item-title">${i.title}</div>
            <div class="cart-item-price">$${i.price.toFixed(2)}</div>
          </div>
          <button onclick="removeFromCart(${i.id})" style="background:none;border:none;cursor:pointer;font-size:1.25rem">✕</button>
        </div>
      `).join('');
      const total = cart.reduce((s, i) => s + i.price, 0).toFixed(2);
      totalEl.innerHTML = `Total: $${total} <button class="btn-clear" onclick="clearCart()">Clear</button>`;
    }

    function removeFromCart(id) {
      cart = cart.filter(i => i.id !== id);
localStorage.setItem('db_cart', JSON.stringify(cart));
      updateBadges();
      renderCart();
    }

    function clearCart() {
      cart = [];
      localStorage.setItem('db_cart', JSON.stringify(cart));
      updateBadges();
      renderCart();
    }

    // ===== UPDATE BADGES =====
    function updateBadges() {
      document.getElementById('favBadge').textContent = '❤️ ' + favorites.length;
      document.getElementById('cartBadge').textContent = '🛒 ' + cart.length;
    }

    // ===== NAV LINKS =====
    document.querySelectorAll('.nav-links a').forEach(function(a) {
      a.onclick = function(e) {
        e.preventDefault();
        document.querySelectorAll('.nav-links a').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        const page = this.dataset.page;
        if (page === 'categories') {
          document.querySelector('.categories').scrollIntoView({behavior: 'smooth'});
        } else {
          window.scrollTo({top: 0, behavior: 'smooth'});
        }
      };
    });

    // ===== INIT =====
    updateBadges();
    loadProducts();
  </script>
</body>
</html>
