<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DealBuddy — Full Stack Auth</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/react-router-dom@6/umd/react-router-dom.development.js" crossorigin></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;color:#333;background:#f8f9fa}
    a{text-decoration:none;color:#2563eb}
    img{max-width:100%;height:auto;border-radius:8px}
    .header{background:linear-gradient(135deg,#1e293b 0%,#334155 100%);padding:1rem 2rem;position:sticky;top:0;z-index:100}
    .header nav{display:flex;align-items:center;gap:2rem;max-width:1200px;margin:0 auto;flex-wrap:wrap}
    .header nav a{color:#e2e8f0;font-weight:500}
    .header nav a:hover{color:#fff}
    .header nav a:first-child{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:1rem}
    .badge-count{padding:0.25rem 0.625rem;border-radius:50px;font-size:0.8rem;font-weight:700}
    .fav-badge{background:#ef4444;color:#fff}
    .cart-badge{background:#16a34a;color:#fff;cursor:pointer}
    .user-badge{background:#667eea;color:#fff;padding:0.25rem 0.75rem;border-radius:50px;font-size:0.8rem;font-weight:600}
    .toast{position:fixed;bottom:2rem;right:2rem;background:#1e293b;color:#fff;padding:1rem 1.5rem;border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,0.2);z-index:1000;animation:slideIn 0.3s ease}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    .hero{text-align:center;padding:5rem 2rem;background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);color:#fff}
    .hero h1{font-size:2.5rem;margin-bottom:1rem}
    .hero p{font-size:1.1rem;margin-bottom:2rem;opacity:0.9}
    .hero form{display:flex;flex-direction:column;gap:0.75rem;max-width:500px;margin:0 auto}
    .hero input{padding:1rem 1.5rem;border:2px solid rgba(255,255,255,0.3);border-radius:12px;font-size:1rem;width:100%;background:rgba(255,255,255,0.15);color:#fff}
    .hero input::placeholder{color:rgba(255,255,255,0.6)}
    .hero input:focus{outline:none;border-color:#f59e0b;background:rgba(255,255,255,0.25)}
    .hero button{padding:1rem 2rem;background:linear-gradient(135deg,#f59e0b,#f97316);color:#1e293b;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;width:100%}
    .api-status{margin-top:1rem;font-size:0.85rem;opacity:0.8}
    .api-status span{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:0.5rem}
    .api-live{background:#22c55e}
    .stats-bar{background:#fff;padding:1.5rem 2rem;border-bottom:1px solid #e2e8f0}
    .stats-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:center;gap:3rem;flex-wrap:wrap}
    .stat-item{text-align:center}
    .stat-number{font-size:1.75rem;font-weight:800;color:#667eea}
    .stat-label{font-size:0.8rem;color:#64748b;text-transform:uppercase;letter-spacing:0.05em}
    .deals{padding:4rem 2rem;max-width:1200px;margin:0 auto}
    .deals h2{font-size:1.75rem;margin-bottom:2rem;text-align:center}
    .deals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
    .deal-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.06);transition:transform 0.3s}
    .deal-card:hover{transform:translateY(-8px);box-shadow:0 12px 40px rgba(0,0,0,0.15)}
    .deal-card:hover img{transform:scale(1.05)}
    .deal-card img{width:100%;height:200px;object-fit:cover;transition:transform 0.3s}
.deal-card-body{padding:1.25rem}
    .deal-card h3{font-size:1rem;font-weight:700;margin-bottom:0.5rem}
    .deal-card .price{font-size:1.1rem}
    .deal-card .price strong{color:#1e293b}
    .deal-card .price s{color:#999;margin-left:0.5rem}
    .deal-card .savings{color:#16a34a;font-weight:600;margin-top:0.25rem}
    .deal-card .retailer{color:#64748b;font-size:0.85rem;margin-top:0.25rem}
    .deal-card-actions{display:flex;gap:0.75rem;margin-top:1rem;align-items:center}
    .deal-card-actions a{font-weight:600;color:#667eea;font-size:0.9rem}
    .card-badge{position:absolute;top:0.5rem;left:0.5rem;background:#fff;padding:0.25rem 0.5rem;border-radius:6px;font-size:0.75rem;font-weight:700;color:#667eea}
    .fav-btn{position:absolute;top:0.5rem;right:0.5rem;background:#fff;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
    .add-cart-btn{padding:0.5rem 1rem;background:#f1f5f9;border:2px solid #e2e8f0;border-radius:8px;font-weight:600;font-size:0.85rem;cursor:pointer;transition:all 0.2s;color:#475569}
    .add-cart-btn.added{background:#dcfce7;border-color:#16a34a;color:#16a34a}
    .categories{padding:4rem 2rem;max-width:1200px;margin:0 auto;text-align:center}
    .categories h2{font-size:1.75rem;margin-bottom:2rem}
    .categories ul{list-style:none;display:flex;flex-wrap:wrap;justify-content:center;gap:0.75rem}
    .categories li a{display:inline-block;padding:0.75rem 1.5rem;background:#fff;border:2px solid #e2e8f0;border-radius:50px;font-weight:600;color:#475569;transition:all 0.3s}
    .categories li a:hover,.categories li a.active{border-color:#667eea;color:#667eea;transform:translateY(-2px)}
    .auth-page{padding:4rem 2rem;max-width:400px;margin:0 auto}
    .auth-page h1{font-size:1.75rem;margin-bottom:1.5rem;text-align:center;color:#1e293b}
    .auth-form{display:flex;flex-direction:column;gap:1rem}
    .auth-form label{font-weight:600;color:#374151}
    .auth-form input{padding:0.875rem 1.25rem;border:2px solid #e2e8f0;border-radius:10px;font-size:1rem;transition:border-color 0.2s}
    .auth-form input:focus{outline:none;border-color:#667eea}
    .auth-form button{padding:1rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}
    .auth-form button:hover{opacity:0.9}
    .auth-form .switch{text-align:center;margin-top:1rem;color:#64748b;font-size:0.9rem}
    .auth-form .switch a{color:#667eea;font-weight:600}
    .auth-error{background:#fee2e2;color:#dc2626;padding:0.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:0.9rem}
    .auth-success{background:#dcfce7;color:#166534;padding:0.75rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:0.9rem}
    .newsletter{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:4rem 2rem;text-align:center;color:#fff}
    .newsletter h2{font-size:1.75rem;margin-bottom:1rem}
    .newsletter p{opacity:0.8;margin-bottom:2rem}
    .newsletter form{display:flex;flex-direction:column;gap:0.75rem;max-width:450px;margin:0 auto}
    .newsletter input{padding:1rem 1.5rem;border:2px solid rgba(255,255,255,0.3);border-radius:12px;font-size:1rem;width:100%;background:rgba(255,255,255,0.15);color:#fff}
    .newsletter input::placeholder{color:rgba(255,255,255,0.6)}
    .newsletter input:focus{outline:none;border-color:#f59e0b}
    .newsletter button{padding:1rem 2rem;background:linear-gradient(135deg,#f59e0b,#f97316);color:#1e293b;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
    .newsletter .success-msg{background:rgba(22,163,74,0.2);padding:1rem;border-radius:8px;margin-top:1rem}
    .cart-drawer{position:fixed;top:0;right:0;width:350px;max-width:90vw;height:100vh;background:#fff;box-shadow:-4px 0 30px rgba(0,0,0,0.15);z-index:200;padding:2rem;overflow-y:auto;animation:slideLeft 0.3s ease}
    @keyframes slideLeft{from{transform:translateX(100%)}to{transform:translateX(0)}}
.cart-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:199}
    .cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
    .cart-close{background:none;border:none;font-size:1.5rem;cursor:pointer}
    .cart-item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid #e2e8f0;align-items:center}
    .cart-item img{width:60px;height:60px;object-fit:cover;border-radius:8px}
    .cart-item-info{flex:1}
    .cart-item-title{font-weight:600;font-size:0.9rem}
    .cart-item-price{color:#16a34a;font-weight:700}
    .cart-empty{text-align:center;padding:3rem 1rem;color:#64748b}
    .cart-total{font-size:1.25rem;font-weight:700;margin-top:1.5rem;padding-top:1rem;border-top:2px solid #e2e8f0}
    .skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skeleton-card{height:320px}
    .page-about,.page-contact{padding:4rem 2rem;max-width:800px;margin:0 auto}
    .page-about h1,.page-contact h1{font-size:2rem;margin-bottom:1.5rem;color:#1e293b}
    .page-about p{color:#64748b;margin-bottom:1.5rem;line-height:1.8}
    .tech-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-top:2rem}
    .tech-item{background:#fff;padding:1.5rem;border-radius:12px;text-align:center;font-weight:600;color:#667eea;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
    .contact-form{display:flex;flex-direction:column;gap:1rem;max-width:500px;margin:0 auto}
    .contact-form label{font-weight:600;color:#374151}
    .contact-form input,.contact-form textarea{padding:0.875rem 1.25rem;border:2px solid #e2e8f0;border-radius:10px;font-size:1rem;transition:border-color 0.2s}
    .contact-form input:focus,.contact-form textarea:focus{outline:none;border-color:#667eea}
    .contact-form button{padding:1rem 2rem;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
    .contact-success{background:#dcfce7;color:#166534;padding:1.5rem;border-radius:12px;margin-top:1rem}
    .footer{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);color:#fff;padding:3rem 2rem;text-align:center;margin-top:4rem}
    .footer p{opacity:0.6;font-size:0.875rem}
    .not-found{text-align:center;padding:6rem 2rem}
    .not-found h1{font-size:4rem;color:#667eea;margin-bottom:1rem}
    .loading{text-align:center;padding:3rem;color:#666}
    .no-results{text-align:center;color:#666;padding:2rem}
    .error-msg{text-align:center;padding:3rem;color:#dc2626}
    @media(min-width:768px){.hero form{flex-direction:row}.hero input{flex:1;width:auto}.hero button{width:auto}.newsletter form{flex-direction:row}.newsletter input{flex:1;width:auto}}
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, createContext, useContext, useReducer } = React;
    const { BrowserRouter, Routes, Route, Link, useParams, useNavigate } = ReactRouterDOM;

    const API_BASE = 'http://localhost:3001';

    // ===== AUTH CONTEXT =====
    const AuthCtx = createContext();
    function AuthProvider({children}) {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        const token = localStorage.getItem('token');
        const savedUser = localStorage.getItem('user');
        if(token && savedUser) { setUser(JSON.parse(savedUser)); }
        setLoading(false);
      }, []);
      const login = async (email, password) => {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error);
localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        setUser(data.user);
        return data;
      };
      const register = async (name, email, password) => {
        const res = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({name, email, password})
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error);
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        setUser(data.user);
        return data;
      };
      const logout = () => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        setUser(null);
      };
      return <AuthCtx.Provider value={{user,login,register,logout,loading}}>{children}</AuthCtx.Provider>;
    }
    function useAuth(){ return useContext(AuthCtx); }

    // ===== APP CONTEXT =====
    const getInitial = () => { try { const s=localStorage.getItem('db_state'); if(s) return JSON.parse(s); } catch{} return {favorites:[],cart:[],toast:null}; };
    function reducer(state, action) {
      let n;
      switch(action.type) {
        case 'ADD_FAV': n={...state,favorites:[...state.favorites,action.payload],toast:'❤️ Added!'}; break;
        case 'REM_FAV': n={...state,favorites:state.favorites.filter(id=>id!==action.payload),toast:'💔 Removed'}; break;
        case 'ADD_CART': state.cart.find(i=>i.id===action.payload.id)?n={...state,toast:'Already in cart!'}:n={...state,cart:[...state.cart,action.payload],toast:`🛒 ${action.payload.title} added!`}; break;
        case 'REM_CART': n={...state,cart:state.cart.filter(i=>i.id!==action.payload),toast:'Removed'}; break;
        case 'CLEAR_CART': n={...state,cart:[],toast:'Cart cleared'}; break;
        case 'TOAST': n={...state,toast:action.payload}; break;
        case 'CLEAR_TOAST': n={...state,toast:null}; break;
        default: return state;
      }
      localStorage.setItem('db_state',JSON.stringify(n));
      return n;
    }
    const AppCtx = createContext();
    function AppProvider({children}) {
      const [state,dispatch] = useReducer(reducer,null,getInitial);
      useEffect(()=>{if(state.toast){const t=setTimeout(()=>dispatch({type:'CLEAR_TOAST'}),3000);return()=>clearTimeout(t);}},[state.toast]);
      return <AppCtx.Provider value={{state,dispatch}}>{children}</AppCtx.Provider>;
    }
    function useApp(){ return useContext(AppCtx); }

    // ===== COMPONENTS =====
    function Skeleton(){return <div className="deal-card"><div className="skeleton skeleton-card"></div></div>;}
    function Toast(){const{state}=useApp();return state.toast?<div className="toast">{state.toast}</div>:null;}

    function Header({onCartClick}) {
      const {state} = useApp();
      const {user,logout} = useAuth();
      return (
        <header className="header">
          <nav>
            <Link to="/"><strong>DealBuddy</strong></Link>
            <Link to="/">Deals</Link>
            <Link to="/categories">Categories</Link>
            <Link to="/about">About</Link>
            {user ? (
              <>
                <span className="user-badge">👤 {user.name}</span>
                <a href="#" onClick={e=>{e.preventDefault();logout();}}>Logout</a>
              </>
            ) : (
              <Link to="/login">Login</Link>
            )}
            <div className="header-right">
              {state.favorites.length>0&&<span className="badge-count fav-badge">❤️ {state.favorites.length}</span>}
              {state.cart.length>0&&<span className="badge-count cart-badge" onClick={onCartClick}>🛒 {state.cart.length}</span>}
            </div>
          </nav>
        </header>
      );
    }
function CartDrawer({isOpen,onClose}){const{state,dispatch}=useApp();if(!isOpen)return null;const total=state.cart.reduce((s,i)=>s+i.price,0);return(<><div className="cart-overlay" onClick={onClose}></div><div className="cart-drawer"><div className="cart-header"><h3>🛒 Cart ({state.cart.length})</h3><button className="cart-close" onClick={onClose}>✕</button></div>{state.cart.length===0?<div className="cart-empty">Empty</div>:<>{state.cart.map(i=><div key={i.id} className="cart-item"><img src={i.image} alt={i.title}/><div className="cart-item-info"><div className="cart-item-title">{i.title}</div><div className="cart-item-price">${i.price.toFixed(2)}</div></div><button onClick={()=>dispatch({type:'REM_CART',payload:i.id})} style={{background:'none',border:'none',cursor:'pointer',fontSize:'1.25rem'}}>✕</button></div>)}<div className="cart-total">Total: ${total.toFixed(2)}<button onClick={()=>dispatch({type:'CLEAR_CART'})} style={{float:'right',padding:'0.25rem 0.75rem',background:'#ef4444',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'0.8rem'}}>Clear</button></div></>}</div></>);}

    function Layout({children}){const[cartOpen,setCartOpen]=useState(false);return(<><Header onCartClick={()=>setCartOpen(true)}/><main>{children}</main><footer className="footer"><p>© 2026 Owolabi Onaope Christopher</p></footer><CartDrawer isOpen={cartOpen} onClose={()=>setCartOpen(false)}/><Toast/></>);}

    function DealCard({deal}){const{state,dispatch}=useApp();const isFav=state.favorites.includes(deal.id);const inCart=state.cart.find(i=>i.id===deal.id);return(<article className="deal-card"><div style={{position:'relative'}}><img src={deal.image} alt={deal.title} loading="lazy"/><span className="card-badge">{deal.category}</span><button className="fav-btn" onClick={()=>dispatch({type:isFav?'REM_FAV':'ADD_FAV',payload:deal.id})}>{isFav?'❤️':'🤍'}</button></div><div className="deal-card-body"><h3>{deal.title}</h3><p className="price"><strong>${deal.price.toFixed(2)}</strong></p><p className="retailer">⭐️ {deal.rating?.rate||'4.5'} • {deal.rating?.count||'100'} reviews</p><div className="deal-card-actions"><Link to={`/deal/${deal.id}`}>View Deal →</Link><button className={`add-cart-btn ${inCart?'added':''}`} onClick={()=>dispatch({type:'ADD_CART',payload:deal})} disabled={!!inCart}>{inCart?'✓ Added':'+ Cart'}</button></div></div></article>);}

    function useFetch(url){const[data,setData]=useState(null);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);useEffect(()=>{const ctrl=new AbortController();(async()=>{setLoading(true);setError(null);try{const r=await fetch(url,{signal:ctrl.signal});if(!r.ok)throw new Error(`HTTP ${r.status}`);setData(await r.json());}catch(e){if(e.name!=='AbortError')setError(e.message);}finally{setLoading(false);}})();return()=>ctrl.abort();},[url]);return{data,loading,error};}

    function useDebounce(val,delay){const[dv,setDv]=useState(val);useEffect(()=>{const t=setTimeout(()=>setDv(val),delay);return()=>clearTimeout(t);},[val,delay]);return dv;}

    // ===== PAGES =====
    function HomePage(){const[term,setTerm]=useState('');const{data:apiData,loading,error}=useFetch(`${API_BASE}/api/products`);const debounced=useDebounce(term,300);const deals=useMemo(()=>{if(!apiData?.products)return[];return apiData.products.map(p=>({id:p.id,title:p.title,price:p.price,originalPrice:p.originalPrice,savings:p.savings,retailer:p.retailer,category:p.category,image:p.image,rating:p.rating}));},[apiData]);const filtered=useMemo(()=>{const t=debounced.toLowerCase().trim();return t?deals.filter(({title,category})=>title.toLowerCase().includes(t)||category.toLowerCase().includes(t)):deals;},[deals,debounced]);
    if(loading)return(<><section className="hero"><h1>Find the Best Deals</h1><p>Loading...</p></section><section className="deals"><h2>Featured Deals</h2><div className="deals-grid">{[1,2,3,4,5,6].map(i=><Skeleton key={i}/>)}</div></section></>);
if(error)return(<div className="error-msg"><h2>❌ Error</h2><p>{error}</p><button onClick={()=>window.location.reload()}>Retry</button></div>);
    return(<><section className="hero"><h1>Find the Best Deals</h1><p>Live from your backend!</p><form onSubmit={e=>e.preventDefault()}><input type="search" value={term} onChange={e=>setTerm(e.target.value)} placeholder="Search..."/><button type="submit">Search</button></form><p className="api-status"><span className="api-live"></span>{deals.length} products from your API</p></section><section className="stats-bar"><div className="stats-inner"><div className="stat-item"><div className="stat-number">{deals.length}</div><div className="stat-label">Products</div></div><div className="stat-item"><div className="stat-number">{deals.filter(d=>d.price<50).length}</div><div className="stat-label">Under $50</div></div><div className="stat-item"><div className="stat-number">{new Set(deals.map(d=>d.category)).size}</div><div className="stat-label">Categories</div></div><div className="stat-item"><div className="stat-number">${(deals.reduce((s,d)=>s+d.price,0)/deals.length).toFixed(0)}</div><div className="stat-label">Avg Price</div></div></div></section><section className="deals" id="deals"><h2>Featured Deals ({filtered.length})</h2><div className="deals-grid">{filtered.map(d=><DealCard key={d.id} deal={d}/>)}</div></section><section className="categories" id="categories"><h2>Browse by Category</h2><ul>{Array.from(new Set(deals.map(d=>d.category))).map(c=><li key={c}><a href="#" onClick={e=>{e.preventDefault();setTerm(c);}}>{c}</a></li>)}</ul></section></>);}

    function DealPage(){const{id}=useParams();const nav=useNavigate();const{state,dispatch}=useApp();const{data:p,loading,error}=useFetch(`${API_BASE}/api/products/${id}`);if(loading)return<div className="loading">🔄 Loading...</div>;if(error||!p)return<div className="not-found"><h1>404</h1><button onClick={()=>navigate('/')}>Go Home</button></div>;const isFav=state.favorites.includes(p.id);const inCart=state.cart.find(i=>i.id===p.id);const deal={id:p.id,title:p.title,price:p.price,originalPrice:p.originalPrice,savings:p.savings,retailer:p.retailer,category:p.category,image:p.image,rating:p.rating};return(<section className="page-about" style={{maxWidth:'600px'}}><img src={p.image} alt={p.title} style={{width:'100%',height:'300px',objectFit:'contain',background:'#fff',padding:'1rem',marginBottom:'2rem'}}/><h1>{p.title}</h1><p style={{fontSize:'0.85rem',color:'#64748b',textTransform:'capitalize'}}>{p.category}</p><p style={{fontSize:'1.5rem',color:'#16a34a',fontWeight:700,marginTop:'1rem'}}>${p.price.toFixed(2)}</p><p style={{marginTop:'1rem'}}>{p.description||'No description'}</p><p style={{marginTop:'1rem'}}>⭐️ {p.rating?.rate||'N/A'} ({p.rating?.count||0})</p><div style={{marginTop:'2rem',display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap'}}><button className="add-cart-btn" onClick={()=>dispatch({type:isFav?'REM_FAV':'ADD_FAV',payload:p.id})} style={{padding:'0.75rem 1.5rem'}}>{isFav?'❤️ Saved':'🤍 Save'}</button><button className={`add-cart-btn ${inCart?'added':''}`} onClick={()=>dispatch({type:'ADD_CART',payload:deal})} disabled={!!inCart} style={{padding:'0.75rem 1.5rem'}}>{inCart?'✓ In Cart':'+ Cart'}</button><button onClick={()=>navigate('/')} style={{padding:'0.75rem 1.5rem',background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',fontWeight:600,cursor:'pointer'}}>← Back</button></div></section>);}
if(error)return(<div className="error-msg"><h2>❌ Error</h2><p>{error}</p><button onClick={()=>window.location.reload()}>Retry</button></div>);
    return(<><section className="hero"><h1>Find the Best Deals</h1><p>Live from your backend!</p><form onSubmit={e=>e.preventDefault()}><input type="search" value={term} onChange={e=>setTerm(e.target.value)} placeholder="Search..."/><button type="submit">Search</button></form><p className="api-status"><span className="api-live"></span>{deals.length} products from your API</p></section><section className="stats-bar"><div className="stats-inner"><div className="stat-item"><div className="stat-number">{deals.length}</div><div className="stat-label">Products</div></div><div className="stat-item"><div className="stat-number">{deals.filter(d=>d.price<50).length}</div><div className="stat-label">Under $50</div></div><div className="stat-item"><div className="stat-number">{new Set(deals.map(d=>d.category)).size}</div><div className="stat-label">Categories</div></div><div className="stat-item"><div className="stat-number">${(deals.reduce((s,d)=>s+d.price,0)/deals.length).toFixed(0)}</div><div className="stat-label">Avg Price</div></div></div></section><section className="deals" id="deals"><h2>Featured Deals ({filtered.length})</h2><div className="deals-grid">{filtered.map(d=><DealCard key={d.id} deal={d}/>)}</div></section><section className="categories" id="categories"><h2>Browse by Category</h2><ul>{Array.from(new Set(deals.map(d=>d.category))).map(c=><li key={c}><a href="#" onClick={e=>{e.preventDefault();setTerm(c);}}>{c}</a></li>)}</ul></section></>);}

    function DealPage(){const{id}=useParams();const nav=useNavigate();const{state,dispatch}=useApp();const{data:p,loading,error}=useFetch(`${API_BASE}/api/products/${id}`);if(loading)return<div className="loading">🔄 Loading...</div>;if(error||!p)return<div className="not-found"><h1>404</h1><button onClick={()=>navigate('/')}>Go Home</button></div>;const isFav=state.favorites.includes(p.id);const inCart=state.cart.find(i=>i.id===p.id);const deal={id:p.id,title:p.title,price:p.price,originalPrice:p.originalPrice,savings:p.savings,retailer:p.retailer,category:p.category,image:p.image,rating:p.rating};return(<section className="page-about" style={{maxWidth:'600px'}}><img src={p.image} alt={p.title} style={{width:'100%',height:'300px',objectFit:'contain',background:'#fff',padding:'1rem',marginBottom:'2rem'}}/><h1>{p.title}</h1><p style={{fontSize:'0.85rem',color:'#64748b',textTransform:'capitalize'}}>{p.category}</p><p style={{fontSize:'1.5rem',color:'#16a34a',fontWeight:700,marginTop:'1rem'}}>${p.price.toFixed(2)}</p><p style={{marginTop:'1rem'}}>{p.description||'No description'}</p><p style={{marginTop:'1rem'}}>⭐️ {p.rating?.rate||'N/A'} ({p.rating?.count||0})</p><div style={{marginTop:'2rem',display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap'}}><button className="add-cart-btn" onClick={()=>dispatch({type:isFav?'REM_FAV':'ADD_FAV',payload:p.id})} style={{padding:'0.75rem 1.5rem'}}>{isFav?'❤️ Saved':'🤍 Save'}</button><button className={`add-cart-btn ${inCart?'added':''}`} onClick={()=>dispatch({type:'ADD_CART',payload:deal})} disabled={!!inCart} style={{padding:'0.75rem 1.5rem'}}>{inCart?'✓ In Cart':'+ Cart'}</button><button onClick={()=>navigate('/')} style={{padding:'0.75rem 1.5rem',background:'#f1f5f9',border:'2px solid #e2e8f0',borderRadius:'10px',fontWeight:600,cursor:'pointer'}}>← Back</button></div></section>);}
    
    function CategoriesPage(){const[sel,setSel]=useState('');const{data:apiData,loading}=useFetch(`${API_BASE}/api/products`);const cats=useMemo(()=>apiData?.products?[...new Set(apiData.products.map(p=>p.category))]:[],[apiData]);const filtered=useMemo(()=>{if(!apiData?.products)return[];return sel?apiData.products.filter(p=>p.category===sel):apiData.products;},[apiData,sel]);if(loading)return<div className="loading">🔄 Loading...</div>;return(<><section className="categories"><h2>Browse by Category</h2><ul><li><a href="#" className={!sel?'active':''} onClick={e=>{e.preventDefault();setSel('');}}>All</a></li>{cats.map(c=><li key={c}><a href="#" className={sel===c?'active':''} onClick={e=>{e.preventDefault();setSel(c);}}>{c}</a></li>)}</ul></section><section className="deals"><h2>{sel?`${filtered.length} products`:'All'}</h2><div className="deals-grid">{filtered.map(d=><DealCard key={d.id} deal={d}/>)}</div></section></>);}

    function LoginPage(){const[email,setEmail]=useState('');const[password,setPassword]=useState('');const[error,setError]=useState('');const{login}=useAuth();const nav=useNavigate();const handleSubmit=async(e)=>{e.preventDefault();setError('');try{await login(email,password);nav('/');}catch(err){setError(err.message);}};return(<section className="auth-page"><h1>Login</h1>{error&&<div className="auth-error">{error}</div>}<form className="auth-form" onSubmit={handleSubmit}><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" required/><label>Password</label><input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" required/><button type="submit">Login</button></form><p className="switch">No account? <Link to="/register">Register</Link></p></section>);}

    function RegisterPage(){const[name,setName]=useState('');const[email,setEmail]=useState('');const[password,setPassword]=useState('');const[error,setError]=useState('');const{register}=useAuth();const nav=useNavigate();const handleSubmit=async(e)=>{e.preventDefault();setError('');try{await register(name,email,password);nav('/');}catch(err){setError(err.message);}};return(<section className="auth-page"><h1>Register</h1>{error&&<div className="auth-error">{error}</div>}<form className="auth-form" onSubmit={handleSubmit}><label>Name</label><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" required/><label>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" required/><label>Password</label><input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" required/><button type="submit">Create Account</button></form><p className="switch">Have an account? <Link to="/login">Login</Link></p></section>);}

    function AboutPage(){return(<section className="page-about"><h1>About DealBuddy</h1><p>Full-stack DealBuddy with authentication. React + Express + JWT.</p><p>Built by <strong>Christopher Owolabi</strong>.</p><h2 style={{marginTop:'2rem',marginBottom:'1rem',color:'#1e293b'}}>Tech Stack</h2><div className="tech-grid"><div className="tech-item">⚛️ React</div><div className="tech-item">🖥️ Node.js</div><div className="tech-item">🚂 Express</div><div className="tech-item">🔐 JWT Auth</div><div className="tech-item">🔗 Context API</div><div className="tech-item">🌍 Fetch API</div><div className="tech-item">💾 LocalStorage</div><div className="tech-item">🚀 Netlify</div></div></section>);}
    
    function ContactPage(){const[form,setForm]=useState({name:'',email:'',message:''});const[sent,setSent]=useState(false);return(<section className="page-contact"><h1>Get In Touch</h1><p>Have a question? Drop me a message!</p>{sent?<div className="contact-success">✅ Sent!</div>:<form className="contact-form" onSubmit={e=>{e.preventDefault();setSent(true);setForm({name:'',email:'',message:''});}}><label>Name</label><input type="text" name="name" value={form.name} onChange={e=>setForm(p=>({...p,[e.target.name]:e.target.value}))} required/><label>Email</label><input type="email" name="email" value={form.email} onChange={e=>setForm(p=>({...p,[e.target.name]:e.target.value}))} required/><label>Message</label><textarea name="message" value={form.message} onChange={e=>setForm(p=>({...p,[e.target.name]:e.target.value}))} rows="5" required/><button type="submit">Send →</button></form>}</section>);}

    function NotFoundPage(){return<div className="not-found"><h1>404</h1><p>Not found.</p><Link to="/">← Home</Link></div>;}

    function App(){return(<AuthProvider><AppProvider><BrowserRouter><Layout><Routes><Route path="/" element={<HomePage/>}/><Route path="/deal/:id" element={<DealPage/>}/><Route path="/categories" element={<CategoriesPage/>}/><Route path="/login" element={<LoginPage/>}/><Route path="/register" element={<RegisterPage/>}/><Route path="/about" element={<AboutPage/>}/><Route path="/contact" element={<ContactPage/>}/><Route path="*" element={<NotFoundPage/>}/></Routes></Layout></BrowserRouter></AppProvider></AuthProvider>);}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
